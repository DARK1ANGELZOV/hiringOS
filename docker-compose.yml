services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /models
    volumes:
      - hf_models:/models
    ports:
      - '8001:8001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8001/healthz || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AI_SERVICE_URL: http://ai-service:8001
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/healthz || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['celery', '-A', 'app.workers.celery_worker.celery_app', 'worker', '--loglevel=info', '--queues=interviews', '--concurrency=2']
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3000 || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ['prod']
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/hiringos.crt ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /etc/nginx/certs/hiringos.key \
            -out /etc/nginx/certs/hiringos.crt \
            -subj "/CN=localhost" -days 3650
        fi
        nginx -g 'daemon off;'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-check-certificate -q --spider https://127.0.0.1 || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ['monitoring']
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    profiles: ['monitoring']
    command: ['-config.file=/etc/loki/local-config.yaml']
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - '3100:3100'

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    profiles: ['monitoring']
    command: ['-config.file=/etc/promtail/config.yml']
    volumes:
      - ./infra/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./infra/logs:/var/log/hiringos
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    profiles: ['monitoring']
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  minio_data:
  hf_models:
  nginx_certs:
  prometheus_data:
  loki_data:
  grafana_data:
