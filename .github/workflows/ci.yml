name: HiringOS CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: |
          pytest -q backend/tests

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Type-check frontend
        run: npm --prefix frontend run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Python dependency audit
        run: pip-audit -r backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend dependency audit (critical only)
        run: |
          npm ci --prefix frontend
          npm audit --prefix frontend --audit-level=critical

  docker-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Validate docker compose
        run: docker compose config

      - name: Build docker images
        run: docker compose build backend frontend ai-service

      - name: Start core stack
        run: docker compose up -d postgres redis minio ai-service backend frontend

      - name: Smoke checks
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/healthz && curl -fsS http://localhost:8001/healthz && curl -fsS http://localhost:3000; then
              echo "Smoke checks passed"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke checks failed"
          docker compose ps
          docker compose logs --tail=150 backend ai-service frontend
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v

